syntax = "proto3";

package auth;

option go_package = "github.com/fanyicharllson/phonkdrift-backend/pb/auth;authpb";

service AuthService {
  rpc RegisterUser(RegisterRequest) returns (RegisterResponse);
  rpc LoginUser(LoginRequest) returns (LoginResponse);
  rpc ValidateToken(ValidateTokenRequest) returns (ValidateTokenResponse);
  rpc VerifyCode(VerifyRequest) returns (VerifyResponse);
  rpc ResendCode(ResendCodeRequest) returns (ResendCodeResponse); // New RPC
  rpc GetUser(GetUserRequest) returns (GetUserResponse);           // New RPC
}

message RegisterRequest {
  string username = 1;
  string email = 2;
  string password = 3;
}

message RegisterResponse {
  string user_id = 1;
  string message = 2;
}

message VerifyRequest {
  string email = 1;
  string code = 2;
}

message VerifyResponse {
  bool success = 1;
  string message = 2;
  string token = 3;        
  int64 expires_at = 4;    
  string user_id = 5;
}

message LoginRequest {
  string email = 1;
  string password = 2;
}

message LoginResponse {
  string token = 1;
  string user_id = 2;
  int64 expires_at = 3; 
}

message ValidateTokenRequest {
  string token = 1;
}

message ValidateTokenResponse {
  bool is_valid = 1;
  string user_id = 2;
  string username = 3;
}

// New messages for ResendCode
message ResendCodeRequest {
  string email = 1;
}

message ResendCodeResponse {
  bool success = 1;
  string message = 2;
}

// New messages for GetUser
message GetUserRequest {
  string user_id = 1;
}

message GetUserResponse {
  User user = 1;
}

message User {
  string user_id = 1;
  string username = 2;
  string email = 3;
  string avatar_url = 4;
}