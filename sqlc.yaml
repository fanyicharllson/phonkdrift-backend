version: "2"
sql:
# Auth Service Storage Definition
  - schema: "internal/auth-service/repository/migrations"
    queries: "internal/auth-service/repository/queries"
    engine: "postgresql" 
    gen:
      go:
        package: "db"
        out: "internal/auth-service/repository/db"
        emit_json_tags: true
        emit_prepared_queries: false
        emit_interface: true

