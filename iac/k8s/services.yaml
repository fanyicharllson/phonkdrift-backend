# ==============================================================================
# 🔐 API EDGE GATEWAY LAYER
# ==============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      initContainers:
      - name: cookies-init
        image: busybox:1.36
        command: ["sh", "-c", "cp /secret-cookies/cookies.txt /app/cookies/cookies.txt 2>/dev/null || true"]
        volumeMounts:
        - name: ytdlp-cookies-secret
          mountPath: /secret-cookies
          readOnly: true
        - name: ytdlp-cookies
          mountPath: /app/cookies
      containers:
      - name: api-gateway
        image: charllson717/phonkdrift-api-gateway:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
        - containerPort: 50050
        envFrom:
        - configMapRef:
            name: phonkdrift-config
        - secretRef:
            name: phonkdrift-secrets
        volumeMounts:
        - name: ytdlp-cookies
          mountPath: /app/cookies
      volumes:
      - name: ytdlp-cookies-secret
        secret:
          secretName: ytdlp-cookies
          optional: true
      - name: ytdlp-cookies
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway-service
spec:
  selector:
    app: api-gateway
  ports:
  - name: http-rest
    protocol: TCP
    port: 8080
    targetPort: 8080
    nodePort: 30080
  - name: grpc-mobile
    protocol: TCP
    port: 50050
    targetPort: 50050
    nodePort: 30050
  type: NodePort