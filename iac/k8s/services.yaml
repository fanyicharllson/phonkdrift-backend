# ==============================================================================
# 🔑 AUTHENTICATION MICROSERVICE
# ==============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
      - name: auth-service
        image: charllson717/phonkdrift-auth:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 50051
        envFrom:
        - configMapRef:
            name: phonkdrift-config
        - secretRef:
            name: phonkdrift-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
spec:
  selector:
    app: auth-service
  ports:
  - protocol: TCP
    port: 50051
    targetPort: 50051
  type: ClusterIP

