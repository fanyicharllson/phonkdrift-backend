# ==============================================================================
# 🔑 AUTHENTICATION MICROSERVICE
# ==============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
      - name: auth-service
        image: charllson717/phonkdrift-auth-service:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 50051
        envFrom:
        - configMapRef:
            name: phonkdrift-config
        - secretRef:                    # ✅ THIS WAS MISSING
            name: phonkdrift-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
spec:
  selector:
    app: auth-service
  ports:
  - protocol: TCP
    port: 50051
    targetPort: 50051
  type: ClusterIP

---
# ==============================================================================
# 🏎️ TRACK & STREAMING MICROSERVICE
# ==============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: track-service-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: track-service
  template:
    metadata:
      labels:
        app: track-service
    spec:
      initContainers:
      - name: cookies-init
        image: busybox:1.36
        command: ["sh", "-c", "cp /secret-cookies/cookies.txt /app/cookies/cookies.txt 2>/dev/null || true"]
        volumeMounts:
        - name: ytdlp-cookies-secret
          mountPath: /secret-cookies
          readOnly: true
        - name: ytdlp-cookies
          mountPath: /app/cookies
      containers:
      - name: track-service
        image: charllson717/phonkdrift-track-service:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 50052
        envFrom:
        - configMapRef:
            name: phonkdrift-config
        - secretRef:
            name: phonkdrift-secrets
        volumeMounts:
        - name: ytdlp-cookies
          mountPath: /app/cookies
      volumes:
      - name: ytdlp-cookies-secret
        secret:
          secretName: ytdlp-cookies
          optional: true
      - name: ytdlp-cookies
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: track-service
spec:
  selector:
    app: track-service
  ports:
  - protocol: TCP
    port: 50052
    targetPort: 50052
  type: ClusterIP

