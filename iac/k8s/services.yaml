---
# ==============================================================================
# 🔐 API EDGE GATEWAY LAYER
# ==============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
      - name: api-gateway
        image: charllson717/phonkdrift-gateway:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
        - containerPort: 50050
        envFrom:
        - configMapRef:
            name: phonkdrift-config
        - secretRef:
            name: phonkdrift-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway-service
spec:
  selector:
    app: api-gateway
  ports:
  - name: http-rest
    protocol: TCP
    port: 8080
    targetPort: 8080
    nodePort: 30080 # Public Web Traffic entrypoint (http://<Cluster-IP>:30080)
  - name: grpc-mobile
    protocol: TCP
    port: 50050
    targetPort: 50050
    nodePort: 30050 # Public Mobile gRPC Stream entrypoint (grpc://<Cluster-IP>:30050)
  type: NodePort