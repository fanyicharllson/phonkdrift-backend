---
- name: Install Production DevOps Infrastructure (Docker & k3s)
  hosts: localhost
  connection: local
  become: yes
  tasks:
    # ==========================================
    # 🐋 1. INSTALL DOCKER CE CORE UTILITIES
    # ==========================================
    - name: Install mandatory prerequisites for Docker repository
      apt:
        name:
          - ca-certificates
          - gnupg
        state: present

    - name: Create directory for Docker APT keyring repository
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    - name: Download and save Docker official GPG security key
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present
        keyring: /etc/apt/keyrings/docker.gpg

    - name: Configure and register official stable Docker repository
      apt_repository:
        repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu jammy stable"
        state: present
        filename: docker

    - name: Install Docker Engine and Docker Compose plugin suite
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present
        update_cache: yes

    - name: Ensure Docker daemon service is verified started and enabled
      service:
        name: docker
        state: started
        enabled: yes

    # ==========================================
    # ☸️ 2. INSTALL K3S (LIGHTWEIGHT KUBERNETES)
    # ==========================================
    
    - name: Download and execute the optimized k3s installation script
      shell: |
        curl -sfL https://get.k3s.io | INSTALL_K3S_EXEC="--disable traefik" sh -
      args:
        creates: /usr/local/bin/k3s

    - name: Ensure k3s system daemon service is running smoothly
      service:
        name: k3s
        state: started
        enabled: yes

    # ==========================================
    # 🔑 3. PERMISSIONS CONFIGURATION
    # ==========================================

    - name: Create standard .kube access directory for root user root access configuration
      file:
        path: /root/.kube
        state: directory
        mode: '0700'

    - name: Symlink cluster configuration context directly into root shell path
      file:
        src: /etc/rancher/k3s/k3s.yaml
        dest: /root/.kube/config
        state: link