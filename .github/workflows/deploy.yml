name: PhonkDrift Continuous Integration & Deployment Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  security-audit:
    name: DevSecOps Code and Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Scan Code Matrix for Security Vulnerabilities (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          ignore-unfixed: true
          format: 'table'
          severity: 'HIGH,CRITICAL'

  build-and-ship:
    name: Container Construction & Registry Export
    needs: security-audit
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 🔥 Parallel multi-architecture compilation layer for your active services
        service: [api-gateway, auth-service, track-service, discovery-service, notification-service]
        # chat-service coming soon placeholder: [api-gateway, auth-service, track-service, notification-service, chat-service]
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub Container Repository
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Scan Image Layer for Structural Flaws
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./internal/${{ matrix.service }}/Dockerfile
          push: false
          tags: charllson717/phonkdrift-${{ matrix.service }}:latest

      - name: Run Trivy Scanner on Compiled Image Binary Layers
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'charllson717/phonkdrift-${{ matrix.service }}:latest'
          format: 'table'
          severity: 'HIGH,CRITICAL'

      - name: Push Verified Production Image to Registry
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./internal/${{ matrix.service }}/Dockerfile
          push: true
          tags: charllson717/phonkdrift-${{ matrix.service }}:latest

  k3s-cluster-rollout:
    name: Production Kubernetes Zero-Downtime Deployment
    needs: build-and-ship
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Manifests Deployment Configurations
        uses: actions/checkout@v4

      - name: Configure Secure Remote Cluster Kubernetes Access Context
        uses: azure/k8s-set-context@v3
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBECONFIG_DATA }}

      - name: Execute Zero-Downtime Rolling Update Deployment
        run: |
          # 1. Apply Infrastructure State Map Layouts (Points directly to your iac/k8s directory context)
          kubectl apply -f iac/k8s/configmap.yaml
          kubectl apply -f iac/k8s/redis.yaml
          kubectl apply -f iac/k8s/rabbitmq.yaml
          
          # 2. Apply Application Pod Container Topology Changes
          kubectl apply -f iac/k8s/services.yaml
          
          # 3. Instruct K3s to execute an immediate zero-downtime rolling restart to download the newest images
          kubectl rollout restart deployment/api-gateway-deployment
          kubectl rollout restart deployment/auth-service-deployment
          kubectl rollout restart deployment/track-service-deployment
          kubectl rollout restart deployment/notification-service-deployment
          kubectl rollout restart deployment/discovery-service-deployment
          # kubectl rollout restart deployment/chat-service-deployment
          
          # 4. Verify deployment rollouts completed successfully
          kubectl rollout status deployment/api-gateway-deployment --timeout=90s